<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Gestor Académico</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
</head>
<body>
    <nav>
        <a class="nav-brand" href="/home/">Gestor Académico</a>
        {% set path = request.path %}
        <div class="nav-links">
            <a href="/home/"      class="nav-link {{ 'active' if path == '/home/' }}">Inicio</a>
            <a href="/profesores" class="nav-link {{ 'active' if path.startswith('/profesores') }}">Profesores</a>
            <a href="/alumnos"    class="nav-link {{ 'active' if path.startswith('/alumnos') }}">Alumnos</a>
            <a href="/cursos"     class="nav-link {{ 'active' if path.startswith('/cursos') }}">Cursos</a>
            <a href="/matriculas"    class="nav-link {{ 'active' if path.startswith('/matriculas') }}">Matrículas</a>
            <a href="/transacciones" class="nav-link {{ 'active' if path.startswith('/transacciones') }}">Transacciones</a>
        </div>
        <div class="nav-spacer"></div>
        <span class="nav-count">BDA · PRÁCTICA 3</span>
    </nav>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <script>
    function showToast(msg, isError) {
        const t = document.createElement('div');
        t.className = 'toast' + (isError ? ' error' : '');
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3200);
    }
    function openModal(id)  { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
